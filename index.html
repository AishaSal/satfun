<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9380922654978015"
     crossorigin="anonymous"></script>
  
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>satoor.fun</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
  <header>
    <nav class="navbar">
      <ul>
        <li><a href="#home">الرئيسية</a></li>
        <li><a href="https://www.fortnite.com/@satoor.fun">الجزر</a></li>
        <li class="logo">Satoor<span>.fun</span></li>
        <li><a href="#about">نبذة</a></li>
        <li><a href="merch.html" target="_blank">المتجر</a></li>

      </ul>
    </nav>
  </header>

  <main>
    <!-- Hero -->
    <section id="home" class="hero">
      <div class="speech">
        <p>أنا مطوّرة جزر مستقلة في UEFN <br> يوتيوبر، مصممة ويب  </p>
      </div>
      <img src="../assets/images/satoorhero.png" alt="شخصية سطور" class="character">
    </section>

    <!-- Cards -->
   <section class="cards">
      <a href="merch.html" class="card red">
        <img src="assets/images/merch.png" alt="المتجر">
        <span></span>
      </a>
      <a href="https://www.fortnite.com/@satoor.fun" class="card blue">
        <img src="https://picsum.photos/200/200?random=11" alt="الجزر">
        <span>الألعاب</span>
      </a>
      <a href="#contact" class="card yellow">
        <img src="https://picsum.photos/200/200?random=12" alt="تواصل">
        <span>تواصل</span>
      </a>
    </section>

    <!-- Wishlist Banner (replace link and image later) -->
    <section class="wishlist">
      <a class="wishlist-box" href="https://uefn.satoor.fun" target="_blank" rel="noopener" aria-label="أضف اللعبة إلى قائمة الأمنيات">
        <img src="../assets/images/codeteacher.png" alt="صورة اللعبة">
        <div class="wishlist-text">
          <strong> تعرف على قائمة أعمالي والدروس الخاصة </strong>
          <span class="store">  بالـ UEFN  </span>
        </div>
      </a>
    </section>

    <!-- Latest Video -->
    <section class="video-section" id="latest-video">
      <div class="section-header">
        <h2>أحدث فيديو</h2>
        <span class="underline" aria-hidden="true"></span>
      </div>
      <div class="video-wrap">
        <!-- استبدل بمُعرّف فيديو قناتك -->
        <iframe
          src="https://www.youtube.com/embed/F1ugNMmv3QE?si=JG6bhriM7mQ929BN"
          title="أحدث فيديو على قناة سطور"
          frameborder="0"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
          allowfullscreen
          referrerpolicy="strict-origin-when-cross-origin">
        </iframe>
      </div>
    </section>
  </main>

  <footer>
    <p>© <span id="year"></span> satoor.fun — جميع الحقوق محفوظة</p>
    
    <li><a href="privacy.html">سياسة الخصوصية</a></li>

  </footer>

  <script src="java.js"></script>
